# Cloudflare Tunnel — reserved for backend API (if added later)
#
# The portfolio frontend is served by Cloudflare Pages at parsasamandi.com.
# This tunnel (ID: 1eb6ee5a-617f-4e57-91c8-6b866fa422a7) is available to
# expose a Railway backend under api.parsasamandi.com if you ever add one.
#
# To activate a backend:
#   1. Update the ingress rule below with your Railway URL
#   2. cloudflared tunnel route dns parsa-portfolio api.parsasamandi.com
#   3. cloudflared tunnel run parsa-portfolio

tunnel: 1eb6ee5a-617f-4e57-91c8-6b866fa422a7
credentials-file: /Users/parsa_samandi/.cloudflared/1eb6ee5a-617f-4e57-91c8-6b866fa422a7.json

ingress:
  # Uncomment and update when adding a Railway backend:
  # - hostname: api.parsasamandi.com
  #   service: https://your-service.up.railway.app

  # Catch-all
  - service: http_status:404
